<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <title>MemoFlow</title>
</head>

<body>

    <h1>MemoFlow</h1>
    
    <main class="main-content">          


        <div class="app">

                <section class="sidebar">

                    <h2>Carpetas</h2>

                    <button class="new-folder-button">
                        + Nueva Carpeta
                    </button>

                    <ul class="folder-list">
                        <li class="folder">
                            <button class="folder-button">
                                <span class="folder-name">General</span>
                                <span class="note-count">4</span>
                            </button>
                        </li>
                    </ul> 

                            

                </section>
                
                <section class="notes">

                    <!-- Buscador -->

                    <!-- Filtros -->

                    <!-- Contador -->

                    <button class="new-note-button">
                        + Nueva Nota
                    </button>

                    <div class="notes-list">

                    <article class="note">
                        
                        <header class="note-header">

                            <span class="note-chevron">▼</span>
                            <input type="text" 
                            class="note-title" 
                            placeholder="Escribí un título">

                            <button class="note-options-button">⋮</button>

                        </header>

                        <div class="note-content">

                            <textarea class="note-text" placeholder="Escribí tu nota"></textarea>

                            <footer class="note-footer">                    
                                
                                    <time datetime="2026-12-07">
                                        07/12/2026
                                    </time>           
                            
                            </footer>

                        </div>

                    </article>

                    </div>

                </section>

        </div>
       

        <button class="delete-button">
            Papelera
        </button>

    </main>


  

    <script src="script.js"></script>
</body>
</html>
