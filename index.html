<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>MemoFlow</title>
</head>

<body>

    <header class="encabezado-principal">
        <h1>MemoFlow</h1>
        <p>Guardá una idea. Organizá tu día.</p>
    </header>
    
    <main>
        
        <button class="boton-crear-nota">
            + Crear Nota
        </button>


        <div class="contenido-principal">

            <section class="carpetas">

                <h2>Carpetas</h2>

                <ul>
                    <li>General</li>
                </ul> 

                <button class="boton-nueva-carpeta">
                    + Nueva Carpeta
                </button>        

            </section>
            
            <section class="notas">

                <article class="nota">
                    
                    <header class="encabezado-nota">

                        <span class="flecha-nota">▼</span>
                        <input type="text" 
                        class="titulo-nota" 
                        placeholder="Escribí un título">

                        <button class="boton-opciones">⋮</button>

                    </header>

                    <div class="contenido-nota">

                    <textarea class="texto-nota" placeholder="Escribí tu nota"></textarea>

                    <footer class="pie-nota">                    
                        
                            <time datetime="2026-12-07">
                                07/12/2026
                            </time>               
                        

                    </footer>

                    </div>

                </article>

        </section>

        </div>
       

        <button class="boton-papelera">
            Papelera
        </button>

    </main>


  

    <script src="script.js"></script>
</body>
</html>
